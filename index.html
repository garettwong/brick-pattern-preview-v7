<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brick Pattern Preview</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1b1d22;font-family:system-ui,-apple-system,sans-serif;color:#e6e6e6;}
  #app{position:fixed;inset:0;}
  #info{position:fixed;left:12px;top:12px;z-index:10;font-size:13px;line-height:1.45;background:rgba(0,0,0,.5);padding:10px 12px;border-radius:10px;max-width:230px;}
  #info b{color:#ffb86c;}
  #stats{position:fixed;left:12px;bottom:12px;z-index:10;font-size:12px;color:#86a;}
  #stats b{color:#9be;}
</style>
</head>
<body>
<div id="app"></div>
<div id="info">
  <b>Brick Preview</b><br>
  Drag to orbit · scroll to zoom.<br>
  Tune the panel (top-right), then hit <b>Export STL</b> to bake a printable mesh.
</div>
<div id="stats"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.6/build/index.module.js",
    "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLExporter } from 'three/addons/exporters/STLExporter.js';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

const INSET = 0.05; // how far the brick skin sits in from the nominal wall face (gives recessed windows)

// ---- optional CSG (boolean) cutting for clean curved openings; loads lazily, falls back to instanced bricks ----
let Brush=null, Evaluator=null, SUBTRACTION=null, csgReady=false;
async function loadCSG(){
  try{
    const m = await import('three-bvh-csg');
    Brush=m.Brush; Evaluator=m.Evaluator; SUBTRACTION=m.SUBTRACTION; csgReady=true;
    build();   // re-run once boolean is available, replacing the instanced preview with the trimmed mesh
  }catch(e){ console.warn('CSG unavailable, showing untrimmed bricks:', e); }
}
function addColorAttr(geo, col){
  const n=geo.attributes.position.count, ca=new Float32Array(n*3);
  for(let k=0;k<n;k++){ ca[3*k]=col.r; ca[3*k+1]=col.g; ca[3*k+2]=col.b; }
  geo.setAttribute('color', new THREE.BufferAttribute(ca,3));
}
// a solid cutter that matches an opening, extruded through the wall, for boolean subtraction
function cutterFor(op, wall, depth){
  const shape=new THREE.Shape();
  if(op.type==='circle'){
    shape.moveTo(op.uc+op.rc, op.vc);
    shape.absarc(op.uc, op.vc, op.rc, 0, Math.PI*2, false);
  } else {
    const hw=op.ww/2, top=op.v0+op.wh;
    shape.moveTo(op.uc-hw, op.v0);
    shape.lineTo(op.uc-hw, top);
    shape.absarc(op.uc, top, hw, Math.PI, 0, true);   // semicircle over the top
    shape.lineTo(op.uc+hw, op.v0);
    shape.lineTo(op.uc-hw, op.v0);
  }
  let geo=new THREE.ExtrudeGeometry(shape, {depth, bevelEnabled:false, curveSegments:64});
  if(geo.attributes.uv) geo.deleteAttribute('uv');
  geo=BufferGeometryUtils.mergeVertices(geo);
  geo.translate(0,0,-depth/2);
  geo.applyMatrix4(new THREE.Matrix4().makeBasis(wall.uDir, wall.vDir, wall.normal).setPosition(wall.origin));
  geo.computeVertexNormals();
  return geo;
}

// ---------- Renderer / scene ----------
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false;   // no shadows (distracting)
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1b1d22);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(5.5, 4, 7);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.HemisphereLight(0xffffff, 0x404a55, 0.75));
const sun = new THREE.DirectionalLight(0xfff3e0, 2.3);
sun.position.set(7, 11, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
const s = 10;
sun.shadow.camera.left=-s; sun.shadow.camera.right=s; sun.shadow.camera.top=s; sun.shadow.camera.bottom=-s;
sun.shadow.bias = -0.0004;
scene.add(sun);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80,80),
  new THREE.MeshStandardMaterial({ color:0x2a2d34, roughness:1 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// ---------- Parameters ----------
const params = {
  width: 4, depth: 3, height: 3.5,
  brickLength: 0.22, brickHeight: 0.07, brickDepth: 0.045, mortarGap: 0.012,
  bondType: 'Running',
  randomness: 0.3,
  rotation: 0.15,
  color: 0xb05a34,
  showCore: true,
  exportSTL: () => exportSTL()
};

// ---------- Helpers ----------
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

function buildWalls(){
  const W=params.width, D=params.depth, H=params.height;
  const O=(x,y,z)=>new THREE.Vector3(x,y,z);
  const V=(x,y,z)=>new THREE.Vector3(x,y,z);

  // openings live only on the front (+Z) wall, in wall-local (u,v)
  const cx = W/2;
  const openings = importedMesh ? [] : [
    // arched door, centre bottom
    { type:'arch', uc:cx,        v0:0.0,  ww:Math.min(0.9, W*0.22), wh:1.4 },
    // two arched windows flanking
    { type:'arch', uc:W*0.25,    v0:1.25, ww:Math.min(0.6, W*0.16), wh:0.9 },
    { type:'arch', uc:W*0.75,    v0:1.25, ww:Math.min(0.6, W*0.16), wh:0.9 },
    // round (rose) window high centre
    { type:'circle', uc:cx,      vc:H*0.8, rc:Math.min(0.42, H*0.13) },
  ];

  return [
    { origin:O(-W/2,0, D/2), uDir:V(1,0,0),  vDir:V(0,1,0), normal:V(0,0,1),  uLen:W, vLen:H, openings },          // front
    { origin:O( W/2,0,-D/2), uDir:V(-1,0,0), vDir:V(0,1,0), normal:V(0,0,-1), uLen:W, vLen:H, openings:[] },        // back
    { origin:O( W/2,0, D/2), uDir:V(0,0,-1), vDir:V(0,1,0), normal:V(1,0,0),  uLen:D, vLen:H, openings:[] },        // right
    { origin:O(-W/2,0,-D/2), uDir:V(0,0,1),  vDir:V(0,1,0), normal:V(-1,0,0), uLen:D, vLen:H, openings:[] },        // left
  ];
}

function inOpening(op,u,v){
  if(op.type==='arch'){
    const hw=op.ww/2;
    if(u>=op.uc-hw && u<=op.uc+hw && v>=op.v0 && v<=op.v0+op.wh) return true; // rect
    const dx=u-op.uc, dy=v-(op.v0+op.wh);
    if(dy>=0 && dx*dx+dy*dy<=hw*hw) return true;                              // arch top
    return false;
  }
  if(op.type==='circle'){ const dx=u-op.uc, dy=v-op.vc; return dx*dx+dy*dy<=op.rc*op.rc; }
  return false;
}
// opening grown by margin m -> the band where the edge course lives; the field skips this.
function inGrownOp(op,u,v,m){
  if(op.type==='arch'){
    const hw=op.ww/2;
    if(u>=op.uc-hw-m && u<=op.uc+hw+m && v>=op.v0-m && v<=op.v0+op.wh) return true;
    const dx=u-op.uc, dy=v-(op.v0+op.wh);
    if(dy>=0 && dx*dx+dy*dy<=(hw+m)*(hw+m)) return true;
    return false;
  }
  const dx=u-op.uc, dy=v-op.vc; return dx*dx+dy*dy<=(op.rc+m)*(op.rc+m);
}
function hitsGrown(wall,u0,v0,u1,v1,m){
  const pts=[[u0,v0],[u1,v0],[u0,v1],[u1,v1],[(u0+u1)/2,(v0+v1)/2]];
  for(const op of wall.openings) for(const [pu,pv] of pts) if(inGrownOp(op,pu,pv,m)) return true;
  return false;
}
// EDGE-FIRST: one course of bricks hugging an opening outline.
// Returns [{cu,cv,phi}] where phi = in-plane angle of the brick's LENGTH axis (tangent to the edge).
function borderFor(op, L, Hb, g){
  const out=[];
  if(op.type==='circle'){
    const rad=op.rc+Hb/2, n=Math.max(12,Math.round(2*Math.PI*rad/(L+g)));
    for(let i=0;i<n;i++){ const th=2*Math.PI*i/n; out.push({cu:op.uc+rad*Math.cos(th), cv:op.vc+rad*Math.sin(th), phi:th+Math.PI/2}); }
    return out;
  }
  const hw=op.ww/2, top=op.v0+op.wh;
  // jambs: a vertical course up each side
  const nj=Math.max(1,Math.round(op.wh/(L+g)));
  for(let i=0;i<nj;i++){ const cv=op.v0+(i+0.5)*op.wh/nj; out.push({cu:op.uc-hw-Hb/2,cv,phi:Math.PI/2}); out.push({cu:op.uc+hw+Hb/2,cv,phi:Math.PI/2}); }
  // arch: voussoir course following the semicircle
  const rad=hw+Hb/2, na=Math.max(4,Math.round(Math.PI*rad/(L+g)));
  for(let i=0;i<=na;i++){ const th=Math.PI*i/na; out.push({cu:op.uc+rad*Math.cos(th), cv:top+rad*Math.sin(th), phi:th+Math.PI/2}); }
  // sill course under a window (skip the ground-level door)
  if(op.v0>0.15){ const ns=Math.max(1,Math.round(op.ww/(L+g))); for(let i=0;i<ns;i++){ out.push({cu:op.uc-hw+(i+0.5)*op.ww/ns, cv:op.v0-Hb/2, phi:0}); } }
  return out;
}

// ---------- Build ----------
const unitBox = new THREE.BoxGeometry(1,1,1);
function bakedBoxGeometry(mat){
  const gg=unitBox.clone().toNonIndexed();
  if(gg.attributes.uv) gg.deleteAttribute('uv');
  gg.applyMatrix4(mat);
  return gg;
}
const brickMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.93, metalness:0.0 });
const csgMat = new THREE.MeshStandardMaterial({ color:0xb05a34, roughness:0.93, metalness:0.0 });
const coreMat  = new THREE.MeshStandardMaterial({ color:0x17181b, roughness:1 });
const roofMat  = new THREE.MeshStandardMaterial({ color:0x3a2c24, roughness:1 });

let brickMesh=null, clipBrickMesh=null, coreMesh=null, roofMesh=null;
let lastMatrices=[], lastBrickGeo=null, lastClipGeo=null, importedMesh=null;
let lastIslandMats=new Map();       // island id -> [Matrix4] for per-face STL export (ZBrush subtools)
let lastIslandClipGeoms=new Map();  // island id -> clipped edge geometries for per-face STL export

function build(){
  if(brickMesh){ scene.remove(brickMesh); brickMesh.geometry.dispose(); if(brickMesh.dispose) brickMesh.dispose(); }
  if(clipBrickMesh){ scene.remove(clipBrickMesh); clipBrickMesh.geometry.dispose(); }
  if(coreMesh){ scene.remove(coreMesh); coreMesh.geometry.dispose(); }
  if(roofMesh){ scene.remove(roofMesh); roofMesh.geometry.dispose(); }
  for(const arr of lastIslandClipGeoms.values()) for(const g of arr) g.dispose();
  lastIslandClipGeoms.clear();
  clipBrickMesh=null; lastClipGeo=null;

  const walls = buildWalls();
  const L=params.brickLength, Hb=params.brickHeight, T=params.brickDepth, g=params.mortarGap;
  const stepU=L+g, stepV=Hb+g;
  const rnd = mulberry32(1337);
  const rotMax = params.rotation * THREE.MathUtils.degToRad(16);
  const base = new THREE.Color(params.color);

  const mats=[], cols=[], clipGeoms=[];
  let clipBrickCount=0;
  let _curIslId=-1;            // which island the next placeIslandBrick() belongs to (for per-face export)
  const NORMAL_Z=new THREE.Vector3(0,0,1);
  function rememberClipGeo(geo){
    clipGeoms.push(geo);
    if(_curIslId>=0){
      let arr=lastIslandClipGeoms.get(_curIslId);
      if(!arr){ arr=[]; lastIslandClipGeoms.set(_curIslId, arr); }
      arr.push(geo);
    }
  }
  const FRAME_PROUD = T*0.18;  // frame course only barely proud — enough to cap the seam, not extrude

  // place a brick: (cu,cv) wall-local centre, (sx,sy) in-plane size, phi = length-axis angle,
  // proud = extra outward relief, jf = jitter scale
  function place(wall, baseQuat, cu, cv, sx, sy, phi, proud, jf){
    const ju=(rnd()-0.5)*g*1.2*params.randomness*jf;
    const jv=(rnd()-0.5)*g*1.2*params.randomness*jf;
    const jn=(rnd()-0.5)*T*0.45*params.randomness*jf;
    const pos=new THREE.Vector3().copy(wall.origin)
      .addScaledVector(wall.uDir, cu+ju)
      .addScaledVector(wall.vDir, cv+jv)
      .addScaledVector(wall.normal, (importedMesh ? T*0.5 : (T/2 - INSET)) + proud + jn);
    const q=baseQuat.clone();
    if(phi) q.multiply(new THREE.Quaternion().setFromAxisAngle(NORMAL_Z, phi));
    if(rotMax>0) q.multiply(new THREE.Quaternion().setFromEuler(new THREE.Euler((rnd()-0.5)*rotMax*jf,(rnd()-0.5)*rotMax*jf,(rnd()-0.5)*rotMax*jf)));
    mats.push(new THREE.Matrix4().compose(pos,q,new THREE.Vector3(Math.max(sx,0.001),Math.max(sy,0.001),T)));
    const c=base.clone(); c.multiplyScalar(1+(rnd()-0.5)*0.4*Math.max(0.25,params.randomness)); cols.push(c);
  }

  // clip a field footprint to the part inside the wall AND outside every opening -> cut "closure" bricks, no gaps
  function clipField(wall,u0,v0,u1,v1){
    let a0=Math.max(u0,0), a1=Math.min(u1,wall.uLen), b0=Math.max(v0,0), b1=Math.min(v1,wall.vLen);
    if(a1-a0<0.012 || b1-b0<0.008) return null;
    for(const op of wall.openings){
      const oA=(op.type==='circle')?[op.uc-op.rc,op.uc+op.rc,op.vc-op.rc,op.vc+op.rc]
                                   :[op.uc-op.ww/2,op.uc+op.ww/2,op.v0,op.v0+op.wh+op.ww/2];
      if(a1<oA[0]||a0>oA[1]||b1<oA[2]||b0>oA[3]) continue;        // far away -> ignore
      const NX=14,NY=9; let mnU=1e9,mxU=-1e9,mnV=1e9,mxV=-1e9,any=false;
      for(let i=0;i<NX;i++)for(let j=0;j<NY;j++){
        const uu=a0+(i+0.5)/NX*(a1-a0), vv=b0+(j+0.5)/NY*(b1-b0);
        if(!inOpening(op,uu,vv)){ any=true; if(uu<mnU)mnU=uu; if(uu>mxU)mxU=uu; if(vv<mnV)mnV=vv; if(vv>mxV)mxV=vv; }
      }
      if(!any) return null;                                       // brick fully inside the hole
      a0=mnU; a1=mxU; b0=mnV; b1=mxV;                            // trim STRICTLY outside the hole (no overhang into the opening)
      if(a1-a0<0.012||b1-b0<0.008) return null;
    }
    return {cu:(a0+a1)/2, cv:(b0+b1)/2, sx:a1-a0, sy:b1-b0};
  }

  const raycaster = new THREE.Raycaster();
  function placeClad(wall, baseQuat, u, v, nCoord){
    const q=baseQuat.clone();
    if(rotMax>0) q.multiply(new THREE.Quaternion().setFromEuler(new THREE.Euler((rnd()-0.5)*rotMax*0.5,(rnd()-0.5)*rotMax*0.5,(rnd()-0.5)*rotMax*0.5)));
    const pos=new THREE.Vector3().copy(wall.origin).addScaledVector(wall.uDir,u).addScaledVector(wall.vDir,v).addScaledVector(wall.normal,nCoord);
    mats.push(new THREE.Matrix4().compose(pos,q,new THREE.Vector3(L,Hb,T)));
    cols.push(base.clone());
  }
  // clad an imported mesh by raycasting each grid cell onto its real surface (follows silhouette + depth, skips empty)
  function cladByRaycast(wall, baseQuat){
    const stepU=L+g, stepV=Hb+g, out=Math.max(params.width,params.depth,params.height)+0.5;
    const dir=wall.normal.clone().negate(), o=new THREE.Vector3();
    const rows=Math.ceil(wall.vLen/stepV)+1, ncol=Math.ceil(wall.uLen/stepU)+1;
    for(let r=0;r<rows;r++){
      const v=r*stepV + Hb/2; if(v>wall.vLen) break;
      const off=(r%2)*(stepU/2);
      for(let c=0;c<ncol;c++){
        const u=off + c*stepU + L/2; if(u>wall.uLen) continue;
        o.copy(wall.origin).addScaledVector(wall.uDir,u).addScaledVector(wall.vDir,v).addScaledVector(wall.normal,out);
        raycaster.set(o, dir);
        const hit=raycaster.intersectObject(importedMesh, false);
        if(!hit.length) continue;
        placeClad(wall, baseQuat, u, v, (out - hit[0].distance) + T*0.5);
      }
    }
  }

  // place a brick on an island plane at local (ca,cb); phi = in-plane length angle, proud = extra relief
  function placeIslandBrick(P,u,v,N, ca,cb, bl,bh, phi, proud){
    const jn=(rnd()-0.5)*T*0.4*params.randomness;
    const p3=P.clone().addScaledVector(u,ca).addScaledVector(v,cb).addScaledVector(N, T*0.5+proud+jn);
    const q=new THREE.Quaternion().setFromRotationMatrix(new THREE.Matrix4().makeBasis(u,v,N));
    if(phi) q.multiply(new THREE.Quaternion().setFromAxisAngle(NORMAL_Z, phi));
    if(rotMax>0) q.multiply(new THREE.Quaternion().setFromEuler(new THREE.Euler((rnd()-0.5)*rotMax,(rnd()-0.5)*rotMax,(rnd()-0.5)*rotMax)));
    const sj=1+(rnd()-0.5)*0.12*params.randomness;
    const M=new THREE.Matrix4().compose(p3,q,new THREE.Vector3(bl*sj,bh*sj,T));
    mats.push(M);
    if(_curIslId>=0){ const arr=lastIslandMats.get(_curIslId); if(arr) arr.push(M); }   // track for per-face STL export
    const c=base.clone(); c.multiplyScalar(1+(rnd()-0.5)*0.35*Math.max(0.25,params.randomness)); cols.push(c);
  }
  // brick ONE normal-island: field bricks (per-face density) + an edge course framing its outline + holes
  function brickIsland(isl){
    _curIslId=isl.id; lastIslandMats.set(isl.id, []);          // start this face's own matrix list (per-face STL)
    const dens=(islandDensity.get(isl.id)||1)*(params.globalDensity||1), bl=L/dens, bh=Hb/dens;
    const N=isl.normal.clone();
    let v=new THREE.Vector3(0,1,0).addScaledVector(N,-N.y);    // world-up projected into the face plane
    if(v.lengthSq()<1e-4) v.set(1,0,0).addScaledVector(N,-N.x);
    v.normalize();
    const u=v.clone().cross(N).normalize();                    // u x v = N  (length axis lies in the face)
    const P=isl.centroid, pos=importedMesh.geometry.attributes.position, tmp=new THREE.Vector3();
    const tris2=[]; let minA=1e9,maxA=-1e9,minB=1e9,maxB=-1e9;
    for(const t of isl.tris){ const tri=[]; for(let k=0;k<3;k++){ tmp.fromBufferAttribute(pos,t*3+k).sub(P); const a=tmp.dot(u),b=tmp.dot(v); tri.push([a,b]); if(a<minA)minA=a;if(a>maxA)maxA=a;if(b<minB)minB=b;if(b>maxB)maxB=b; } tris2.push(tri); }
    const stepU=bl+g, stepV=bh+g; let row=0;
    const tb=tris2.map(t=>[Math.min(t[0][0],t[1][0],t[2][0]),Math.max(t[0][0],t[1][0],t[2][0]),Math.min(t[0][1],t[1][1],t[2][1]),Math.max(t[0][1],t[1][1],t[2][1])]);
    const inIsland=(a,b)=>{ for(let i=0;i<tris2.length;i++){ const x=tb[i]; if(a<x[0]||a>x[1]||b<x[2]||b>x[3]) continue; if(pointInTri2D(a,b,tris2[i])) return true; } return false; };
    // FIELD: full cells stay full-size. Edge cells are clipped against the real STL triangles instead
    // of using sample-point shrink boxes, so roof/window edges fill cleanly without spilling onto neighbours.
    const NX=6,NY=4, edgeInset=Math.min(bl,bh)*0.015;
    for(let bb=minB; bb<maxB; bb+=stepV, row++){
      const off=(row%2)*(stepU/2);
      for(let aa=minA-off; aa<maxA+stepU; aa+=stepU){
        const a0=aa,b0=bb; let cnt=0, mnA=1e9,mxA=-1e9,mnB=1e9,mxB=-1e9;
        for(let ix=0;ix<NX;ix++)for(let jy=0;jy<NY;jy++){ const sa=a0+(ix+0.5)/NX*bl, sb=b0+(jy+0.5)/NY*bh;
          if(inIsland(sa,sb)){ cnt++; if(sa<mnA)mnA=sa;if(sa>mxA)mxA=sa;if(sb<mnB)mnB=sb;if(sb>mxB)mxB=sb; } }
        if(!cnt) continue;
        let lA,hA,lB,hB;
        const fullCell=cnt===NX*NY && inIsland(a0,b0) && inIsland(a0+bl,b0) && inIsland(a0+bl,b0+bh) && inIsland(a0,b0+bh);
        if(fullCell){ lA=a0; hA=a0+bl; lB=b0; hB=b0+bh; }                    // fully inside -> FULL brick (no gap)
        else {
          const parts=clippedBrickParts(a0,b0,a0+bl,b0+bh,tris2,edgeInset);
          let made=false;
          for(const poly of parts){
            const geo=prismFromLocalPoly(P,u,v,N,poly,T,0);
            if(!geo) continue;
            rememberClipGeo(geo); made=true;
          }
          if(made) clipBrickCount++;
          continue;
        }
        const cw=hA-lA, ch=hB-lB; if(cw<bl*0.1||ch<bh*0.1) continue;
        placeIslandBrick(P,u,v,N, (lA+hA)/2, (lB+hB)/2, cw, ch, 0, 0);
      }
    }
    // EDGE COURSE: chain boundary into loops, march evenly, INSET inward so it sits inside the face

    csgMat.color.set(params.color);
    brickMesh=new THREE.Mesh(merged,csgMat);
    brickMesh.castShadow=true; brickMesh.receiveShadow=true;
    lastBrickGeo=merged; scene.add(brickMesh);
  }
  else if(csgReady){

    if(mats.length){

      brickMesh.castShadow = true; brickMesh.receiveShadow = true;
      for(let i=0;i<mats.length;i++){ brickMesh.setMatrixAt(i,mats[i]); brickMesh.setColorAt(i,cols[i]); }
      brickMesh.instanceMatrix.needsUpdate = true;
      if(brickMesh.instanceColor) brickMesh.instanceColor.needsUpdate = true;
      scene.add(brickMesh);
    } else brickMesh=null;
    lastBrickGeo=null;
    if(clipGeoms.length){
      lastClipGeo=BufferGeometryUtils.mergeGeometries(clipGeoms,false);
      clipBrickMesh=new THREE.Mesh(lastClipGeo,csgMat);
      clipBrickMesh.castShadow=true; clipBrickMesh.receiveShadow=true;

    }
  }

    if(!importedMesh.parent) scene.add(importedMesh);   // show the real STL behind the brick cladding
    importedMesh.visible = params.showCore;
  } else {
    coreMesh = new THREE.Mesh(new THREE.BoxGeometry(params.width-2*INSET, params.height, params.depth-2*INSET), coreMat);
    coreMesh.position.set(0, params.height/2, 0);
    coreMesh.castShadow = true; coreMesh.receiveShadow = true;
    coreMesh.visible = params.showCore;
    scene.add(coreMesh);

    const rh = params.height*0.45;
    roofMesh = new THREE.Mesh(new THREE.ConeGeometry(Math.max(params.width,params.depth)*0.8, rh, 4), roofMat);
    roofMesh.rotation.y = Math.PI/4;

    roofMesh.castShadow = true;
    scene.add(roofMesh);
  }

  controls.target.set(0, params.height*0.5, 0);
  document.getElementById('stats').innerHTML = `<b>${count.toLocaleString()}</b> bricks · ${params.bondType} bond · brick ${(L*100).toFixed(0)}×${(Hb*100).toFixed(0)}×${(T*100).toFixed(1)} cm`;
}

// ---------- Bake to STL ----------
function exportSTL(){
  const geoms=[];
  if(lastBrickGeo){                                   // boolean-trimmed mesh -> the clean printable geometry
    const b=lastBrickGeo.clone(); if(b.attributes.color) b.deleteAttribute('color'); if(b.attributes.uv) b.deleteAttribute('uv'); geoms.push(b);
  } else {
    for(const mat of lastMatrices){ const gg=unitBox.clone(); if(gg.attributes.uv) gg.deleteAttribute('uv'); gg.applyMatrix4(mat); geoms.push(gg); }
    if(lastClipGeo){ const cg=lastClipGeo.clone(); if(cg.attributes.color) cg.deleteAttribute('color'); if(cg.attributes.uv) cg.deleteAttribute('uv'); geoms.push(cg); }
  }
  const cg=new THREE.BoxGeometry(params.width-2*INSET, params.height, params.depth-2*INSET);
  cg.translate(0, params.height/2, 0); if(cg.attributes.uv) cg.deleteAttribute('uv');
  geoms.push(cg);
  const merged=BufferGeometryUtils.mergeGeometries(geoms,false);
  const mesh=new THREE.Mesh(merged);
  const data=new STLExporter().parse(mesh,{binary:true});
  const blob=new Blob([data],{type:'application/octet-stream'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='brick-building.stl';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  merged.dispose();
}

// ---------- Per-face STL (one normal-island = one ZBrush subtool) ----------
function faceSTLBlob(islId){
  const arr=lastIslandMats.get(islId)||[], clipped=lastIslandClipGeoms.get(islId)||[];
  if(!arr.length&&!clipped.length) return null;
  const geoms=[];
  for(const mat of arr) geoms.push(clipped.length ? bakedBoxGeometry(mat) : (()=>{ const gg=unitBox.clone(); if(gg.attributes.uv) gg.deleteAttribute('uv'); gg.applyMatrix4(mat); return gg; })());
  for(const src of clipped){ const gg=src.clone(); if(gg.attributes.color) gg.deleteAttribute('color'); if(gg.attributes.uv) gg.deleteAttribute('uv'); geoms.push(gg); }
  const merged=BufferGeometryUtils.mergeGeometries(geoms,false);
  const data=new STLExporter().parse(new THREE.Mesh(merged),{binary:true});
  merged.dispose();
  return new Blob([data],{type:'application/octet-stream'});
}
function downloadBlob(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1500); }
function exportFaceSTL(){

function pointInTri2D(px,py,t){
  const a=t[0],b=t[1],c=t[2];
  const d=(b[1]-c[1])*(a[0]-c[0])+(c[0]-b[0])*(a[1]-c[1]);
  if(Math.abs(d)<1e-12) return false;
  const wa=((b[1]-c[1])*(px-c[0])+(c[0]-b[0])*(py-c[1]))/d;
  const wb=((c[1]-a[1])*(px-c[0])+(a[0]-c[0])*(py-c[1]))/d;
  return wa>=-0.001 && wb>=-0.001 && (1-wa-wb)>=-0.001;
}

    const dx=c[0]-p[0], dy=c[1]-p[1], d=Math.hypot(dx,dy);

  const pt=(p,z)=>new THREE.Vector3().copy(P).addScaledVector(u,p[0]).addScaledVector(v,p[1]).addScaledVector(N,z);

    for(const t of tris){ const idx=[t*3,t*3+1,t*3+2]; for(let e=0;e<3;e++){ const i0=idx[e],i1=idx[(e+1)%3]; const a=vk(i0),b=vk(i1); const k=a<b?a+'|'+b:b+'|'+a; let rec=ec2.get(k); if(!rec){rec={c:0,a:i0,b:i1};ec2.set(k,rec);} rec.c++; } }
    const boundary=[]; for(const rec of ec2.values()) if(rec.c===1) boundary.push([new THREE.Vector3().fromBufferAttribute(pos,rec.a), new THREE.Vector3().fromBufferAttribute(pos,rec.b)]);
    let area=0; const _a=new THREE.Vector3(),_b=new THREE.Vector3(),_c=new THREE.Vector3(),_e1=new THREE.Vector3(),_e2=new THREE.Vector3();
    for(const t of tris){ _a.fromBufferAttribute(pos,t*3);_b.fromBufferAttribute(pos,t*3+1);_c.fromBufferAttribute(pos,t*3+2); _e1.subVectors(_b,_a);_e2.subVectors(_c,_a); area+=0.5*_e1.cross(_e2).length(); }
    let maxDev=0; for(const t of tris) maxDev=Math.max(maxDev, Math.acos(Math.max(-1,Math.min(1, triN[t].dot(n)))));  // curvature: how far member normals fan from the face normal
    merged.push({id:gid, tris, normal:n.clone(), centroid:ctr.clone(), size:tris.length, area, maxDev, boundary});
  }
  importedIslands=merged; islandOfTri=newOfTri;
}
function highlightIslands(){
  if(!importedMesh||!islandOfTri) return;
  const geo=importedMesh.geometry, pos=geo.attributes.position, nv=pos.count;
  let col=geo.getAttribute('color');
  if(!col){ col=new THREE.BufferAttribute(new Float32Array(nv*3),3); geo.setAttribute('color',col);
            importedMesh.material.vertexColors=true; importedMesh.material.color.set(0xffffff); importedMesh.material.needsUpdate=true; }
  for(let t=0;t<nv/3;t++){
    const isl=islandOfTri[t], sel=selectedIslands.has(isl), foc=(isl===focusedIsland);
    const r=foc?0.60:(sel?0.13:0.085), gg=foc?0.75:(sel?0.50:0.085), bb=foc?0.20:(sel?0.28:0.095);
    col.setXYZ(t*3,r,gg,bb); col.setXYZ(t*3+1,r,gg,bb); col.setXYZ(t*3+2,r,gg,bb);
  }
  col.needsUpdate=true;
}
function setupPicking(){
  if(pickingSetup) return; pickingSetup=true;
  const el=renderer.domElement;
  el.addEventListener('pointerdown', e=>{ if(e.button===0) _downXY=[e.clientX,e.clientY]; });
  el.addEventListener('pointerup', e=>{
    if(e.button!==0||!_downXY||!importedMesh){ _downXY=null; return; }
    const moved=Math.hypot(e.clientX-_downXY[0], e.clientY-_downXY[1]); _downXY=null;
    if(moved>6) return;                                       // an orbit-drag, not a click
    const r=el.getBoundingClientRect();
    _ndc.x=((e.clientX-r.left)/r.width)*2-1; _ndc.y=-((e.clientY-r.top)/r.height)*2+1;
    _ray.setFromCamera(_ndc, camera);
    const hit=_ray.intersectObject(importedMesh,false);
    if(!hit.length||islandOfTri==null) return;
    const isl=islandOfTri[hit[0].faceIndex];
    if(isl<0) return;
    if(selectedIslands.has(isl)) selectedIslands.delete(isl); else selectedIslands.add(isl);   // single click toggles bricks on/off
    focusedIsland=isl;                                            // ...and focuses it for the density slider
    if(faceDensCtrl){ params.faceDensity=islandDensity.get(isl)||1; faceDensCtrl.updateDisplay(); }
    highlightIslands(); build();
  });
}

let importedGeoRaw=null;                  // parsed geometry, centred at origin, before rotation/fit
const importRot={x:0,y:0,z:0};            // accumulated 90° turns
function reprocessImport(name){
  if(!importedGeoRaw) return;
  const geo = importedGeoRaw.clone();
  if(importRot.x) geo.rotateX(importRot.x*Math.PI/2);
  if(importRot.y) geo.rotateY(importRot.y*Math.PI/2);
  if(importRot.z) geo.rotateZ(importRot.z*Math.PI/2);
  geo.computeBoundingBox(); const size=new THREE.Vector3(); geo.boundingBox.getSize(size);
  geo.scale(4.0/Math.max(size.x,size.y,size.z), 4.0/Math.max(size.x,size.y,size.z), 4.0/Math.max(size.x,size.y,size.z));
  geo.computeBoundingBox(); geo.boundingBox.getSize(size);
  const ctr=new THREE.Vector3(); geo.boundingBox.getCenter(ctr);
  geo.translate(-ctr.x, -geo.boundingBox.min.y, -ctr.z);     // centre x/z, base on the ground
  if(importedMesh){ scene.remove(importedMesh); importedMesh.geometry.dispose(); }
  importedMesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color:0x17181b, roughness:1, side:THREE.DoubleSide }));
  importedMesh.castShadow=true; importedMesh.receiveShadow=true;
  scene.add(importedMesh);
  computeIslands(geo);
  selectedIslands.clear();
  for(const isl of importedIslands) if(Math.abs(isl.normal.y)<0.85 && isl.area>0.03 && isl.maxDev<0.2) selectedIslands.add(isl.id);  // FLAT, non-horizontal faces (walls+roof); skip floor/ceiling + curved window reveals
  setupPicking(); highlightIslands();
  params.width=size.x; params.depth=size.z; params.height=size.y;
  build();
  if(name) document.getElementById('info').innerHTML = '<b>Imported:</b> '+name+'<br>Click a face to select it (green) + set its density · ✕ to remove.';
}
function loadSTL(buffer, name){
  const geo = stlLoader.parse(buffer);
  geo.computeVertexNormals();
  geo.center();
  importedGeoRaw = geo;
  importRot.x=0; importRot.y=0; importRot.z=0;
  reprocessImport(name||'model.stl');
}
function loadExample(){ fetch('sample-building.stl').then(r=>r.arrayBuffer()).then(b=>loadSTL(b,'example building')).catch(e=>{ console.error(e); alert('Could not load the example building file.'); }); }
const fIm = gui.addFolder('Import');
fIm.add({ pick: ()=>fileInput.click() }, 'pick').name('⬆  Import STL…');
fIm.add({ ex: loadExample }, 'ex').name('🏠  Load example building');
fIm.add({ rx: ()=>{ importRot.x=(importRot.x+1)%4; reprocessImport(); } }, 'rx').name('⟳  Rotate X 90°');
fIm.add({ ry: ()=>{ importRot.y=(importRot.y+1)%4; reprocessImport(); } }, 'ry').name('⟳  Rotate Y 90°');
fIm.add({ rz: ()=>{ importRot.z=(importRot.z+1)%4; reprocessImport(); } }, 'rz').name('⟳  Rotate Z 90°');
fIm.add({ selWalls:()=>{ if(!importedMesh)return; selectedIslands.clear(); for(const i of importedIslands) if(Math.abs(i.normal.y)<0.85 && i.area>0.03 && i.maxDev<0.2) selectedIslands.add(i.id); highlightIslands(); build(); } }, 'selWalls').name('▦  Select walls + roof');
fIm.add({ selAll:()=>{ if(!importedMesh)return; selectedIslands.clear(); for(const i of importedIslands) selectedIslands.add(i.id); highlightIslands(); build(); } }, 'selAll').name('▣  Select ALL faces (global density)');
fIm.add({ rm:()=>{ if(focusedIsland>=0){ selectedIslands.delete(focusedIsland); highlightIslands(); build(); } } }, 'rm').name('✕  Remove clicked face');
fIm.add({ clr:()=>{ selectedIslands.clear(); islandDensity.clear(); focusedIsland=-1; highlightIslands(); if(importedMesh) build(); } }, 'clr').name('▢  Clear all faces');
params.globalDensity=1; params.faceDensity=1;
fIm.add(params,'globalDensity',0.4,3,0.05).name('Global density ×').onChange(()=>{ if(importedMesh) build(); });
faceDensCtrl = fIm.add(params,'faceDensity',0.3,3,0.05).name('Clicked-face density ×').onChange(v=>{ if(focusedIsland>=0){ islandDensity.set(focusedIsland,v); build(); } });
fIm.add({ ef: exportFaceSTL }, 'ef').name('⬇  Export clicked face (STL)');
fIm.add({ ea: exportAllFaces }, 'ea').name('⬇  Export each face separately (ZBrush)');
fIm.add({ sample: ()=>{ if(importedMesh){ scene.remove(importedMesh); importedMesh.geometry.dispose(); importedMesh=null; build(); } } }, 'sample').name('↩  Use sample building');

// ---------- Loop ----------
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
build();
loadCSG();
(function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera); })();
</script>
</body>
