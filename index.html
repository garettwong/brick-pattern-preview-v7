<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brick Pattern Preview</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1b1d22;font-family:system-ui,-apple-system,sans-serif;color:#e6e6e6;}
  #app{position:fixed;inset:0;}
  #info{position:fixed;left:12px;top:12px;z-index:10;font-size:13px;line-height:1.45;background:rgba(0,0,0,.5);padding:10px 12px;border-radius:10px;max-width:230px;}
  #info b{color:#ffb86c;}
  #stats{position:fixed;left:12px;bottom:12px;z-index:10;font-size:12px;color:#86a;}
  #stats b{color:#9be;}
</style>
</head>
<body>
<div id="app"></div>
<div id="info">
  <b>Brick Preview</b><br>
  Drag to orbit · scroll to zoom.<br>
  Tune the panel (top-right), then hit <b>Export STL</b> to bake a printable mesh.
</div>
<div id="stats"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.6/build/index.module.js",
    "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLExporter } from 'three/addons/exporters/STLExporter.js';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

const INSET = 0.05; // how far the brick skin sits in from the nominal wall face (gives recessed windows)

// ---- optional CSG (boolean) cutting for clean curved openings; loads lazily, falls back to instanced bricks ----
let Brush=null, Evaluator=null, SUBTRACTION=null, csgReady=false;
async function loadCSG(){
  try{
    const m = await import('three-bvh-csg');
    Brush=m.Brush; Evaluator=m.Evaluator; SUBTRACTION=m.SUBTRACTION; csgReady=true;
    build();   // re-run once boolean is available, replacing the instanced preview with the trimmed mesh
  }catch(e){ console.warn('CSG unavailable, showing untrimmed bricks:', e); }
}
function addColorAttr(geo, col){
  const n=geo.attributes.position.count, ca=new Float32Array(n*3);
  for(let k=0;k<n;k++){ ca[3*k]=col.r; ca[3*k+1]=col.g; ca[3*k+2]=col.b; }
  geo.setAttribute('color', new THREE.BufferAttribute(ca,3));
}
// a solid cutter that matches an opening, extruded through the wall, for boolean subtraction
function cutterFor(op, wall, depth){
  const shape=new THREE.Shape();
  if(op.type==='circle'){
    shape.moveTo(op.uc+op.rc, op.vc);
    shape.absarc(op.uc, op.vc, op.rc, 0, Math.PI*2, false);
  } else {
    const hw=op.ww/2, top=op.v0+op.wh;
    shape.moveTo(op.uc-hw, op.v0);
    shape.lineTo(op.uc-hw, top);
    shape.absarc(op.uc, top, hw, Math.PI, 0, true);   // semicircle over the top
    shape.lineTo(op.uc+hw, op.v0);
    shape.lineTo(op.uc-hw, op.v0);
  }
  let geo=new THREE.ExtrudeGeometry(shape, {depth, bevelEnabled:false, curveSegments:64});
  if(geo.attributes.uv) geo.deleteAttribute('uv');
  geo=BufferGeometryUtils.mergeVertices(geo);
  geo.translate(0,0,-depth/2);
  geo.applyMatrix4(new THREE.Matrix4().makeBasis(wall.uDir, wall.vDir, wall.normal).setPosition(wall.origin));
  geo.computeVertexNormals();
  return geo;
}

// ---------- Renderer / scene ----------
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1b1d22);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(5.5, 4, 7);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.HemisphereLight(0xffffff, 0x404a55, 0.75));
const sun = new THREE.DirectionalLight(0xfff3e0, 2.3);
sun.position.set(7, 11, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
const s = 10;
sun.shadow.camera.left=-s; sun.shadow.camera.right=s; sun.shadow.camera.top=s; sun.shadow.camera.bottom=-s;
sun.shadow.bias = -0.0004;
scene.add(sun);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80,80),
  new THREE.MeshStandardMaterial({ color:0x2a2d34, roughness:1 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// ---------- Parameters ----------
const params = {
  width: 4, depth: 3, height: 3.5,
  brickLength: 0.22, brickHeight: 0.07, brickDepth: 0.045, mortarGap: 0.012,
  bondType: 'Running',
  randomness: 0.3,
  rotation: 0.15,
  color: 0xb05a34,
  showCore: true,
  exportSTL: () => exportSTL()
};

// ---------- Helpers ----------
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

function buildWalls(){
  const W=params.width, D=params.depth, H=params.height;
  const O=(x,y,z)=>new THREE.Vector3(x,y,z);
  const V=(x,y,z)=>new THREE.Vector3(x,y,z);

  // openings live only on the front (+Z) wall, in wall-local (u,v)
  const cx = W/2;
  const openings = importedMesh ? [] : [
    // arched door, centre bottom
    { type:'arch', uc:cx,        v0:0.0,  ww:Math.min(0.9, W*0.22), wh:1.4 },
    // two arched windows flanking
    { type:'arch', uc:W*0.25,    v0:1.25, ww:Math.min(0.6, W*0.16), wh:0.9 },
    { type:'arch', uc:W*0.75,    v0:1.25, ww:Math.min(0.6, W*0.16), wh:0.9 },
    // round (rose) window high centre
    { type:'circle', uc:cx,      vc:H*0.8, rc:Math.min(0.42, H*0.13) },
  ];

  return [
    { origin:O(-W/2,0, D/2), uDir:V(1,0,0),  vDir:V(0,1,0), normal:V(0,0,1),  uLen:W, vLen:H, openings },          // front
    { origin:O( W/2,0,-D/2), uDir:V(-1,0,0), vDir:V(0,1,0), normal:V(0,0,-1), uLen:W, vLen:H, openings:[] },        // back
    { origin:O( W/2,0, D/2), uDir:V(0,0,-1), vDir:V(0,1,0), normal:V(1,0,0),  uLen:D, vLen:H, openings:[] },        // right
    { origin:O(-W/2,0,-D/2), uDir:V(0,0,1),  vDir:V(0,1,0), normal:V(-1,0,0), uLen:D, vLen:H, openings:[] },        // left
  ];
}

function inOpening(op,u,v){
  if(op.type==='arch'){
    const hw=op.ww/2;
    if(u>=op.uc-hw && u<=op.uc+hw && v>=op.v0 && v<=op.v0+op.wh) return true; // rect
    const dx=u-op.uc, dy=v-(op.v0+op.wh);
    if(dy>=0 && dx*dx+dy*dy<=hw*hw) return true;                              // arch top
    return false;
  }
  if(op.type==='circle'){ const dx=u-op.uc, dy=v-op.vc; return dx*dx+dy*dy<=op.rc*op.rc; }
  return false;
}
// opening grown by margin m -> the band where the edge course lives; the field skips this.
function inGrownOp(op,u,v,m){
  if(op.type==='arch'){
    const hw=op.ww/2;
    if(u>=op.uc-hw-m && u<=op.uc+hw+m && v>=op.v0-m && v<=op.v0+op.wh) return true;
    const dx=u-op.uc, dy=v-(op.v0+op.wh);
    if(dy>=0 && dx*dx+dy*dy<=(hw+m)*(hw+m)) return true;
    return false;
  }
  const dx=u-op.uc, dy=v-op.vc; return dx*dx+dy*dy<=(op.rc+m)*(op.rc+m);
}
function hitsGrown(wall,u0,v0,u1,v1,m){
  const pts=[[u0,v0],[u1,v0],[u0,v1],[u1,v1],[(u0+u1)/2,(v0+v1)/2]];
  for(const op of wall.openings) for(const [pu,pv] of pts) if(inGrownOp(op,pu,pv,m)) return true;
  return false;
}
// EDGE-FIRST: one course of bricks hugging an opening outline.
// Returns [{cu,cv,phi}] where phi = in-plane angle of the brick's LENGTH axis (tangent to the edge).
function borderFor(op, L, Hb, g){
  const out=[];
  if(op.type==='circle'){
    const rad=op.rc+Hb/2, n=Math.max(12,Math.round(2*Math.PI*rad/(L+g)));
    for(let i=0;i<n;i++){ const th=2*Math.PI*i/n; out.push({cu:op.uc+rad*Math.cos(th), cv:op.vc+rad*Math.sin(th), phi:th+Math.PI/2}); }
    return out;
  }
  const hw=op.ww/2, top=op.v0+op.wh;
  // jambs: a vertical course up each side
  const nj=Math.max(1,Math.round(op.wh/(L+g)));
  for(let i=0;i<nj;i++){ const cv=op.v0+(i+0.5)*op.wh/nj; out.push({cu:op.uc-hw-Hb/2,cv,phi:Math.PI/2}); out.push({cu:op.uc+hw+Hb/2,cv,phi:Math.PI/2}); }
  // arch: voussoir course following the semicircle
  const rad=hw+Hb/2, na=Math.max(4,Math.round(Math.PI*rad/(L+g)));
  for(let i=0;i<=na;i++){ const th=Math.PI*i/na; out.push({cu:op.uc+rad*Math.cos(th), cv:top+rad*Math.sin(th), phi:th+Math.PI/2}); }
  // sill course under a window (skip the ground-level door)
  if(op.v0>0.15){ const ns=Math.max(1,Math.round(op.ww/(L+g))); for(let i=0;i<ns;i++){ out.push({cu:op.uc-hw+(i+0.5)*op.ww/ns, cv:op.v0-Hb/2, phi:0}); } }
  return out;
}

// ---------- Build ----------
const unitBox = new THREE.BoxGeometry(1,1,1);
const brickMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.93, metalness:0.0 });
const csgMat = new THREE.MeshStandardMaterial({ color:0xb05a34, roughness:0.93, metalness:0.0 });
const coreMat  = new THREE.MeshStandardMaterial({ color:0x17181b, roughness:1 });
const roofMat  = new THREE.MeshStandardMaterial({ color:0x3a2c24, roughness:1 });

let brickMesh=null, coreMesh=null, roofMesh=null;
let lastMatrices=[], lastBrickGeo=null, importedMesh=null;

function build(){
  if(brickMesh){ scene.remove(brickMesh); brickMesh.geometry.dispose(); if(brickMesh.dispose) brickMesh.dispose(); }
  if(coreMesh){ scene.remove(coreMesh); coreMesh.geometry.dispose(); }
  if(roofMesh){ scene.remove(roofMesh); roofMesh.geometry.dispose(); }

  const walls = buildWalls();
  const L=params.brickLength, Hb=params.brickHeight, T=params.brickDepth, g=params.mortarGap;
  const stepU=L+g, stepV=Hb+g;
  const rnd = mulberry32(1337);
  const rotMax = params.rotation * THREE.MathUtils.degToRad(16);
  const base = new THREE.Color(params.color);

  const mats=[], cols=[];
  const NORMAL_Z=new THREE.Vector3(0,0,1);
  const FRAME_PROUD = T*0.18;  // frame course only barely proud — enough to cap the seam, not extrude

  // place a brick: (cu,cv) wall-local centre, (sx,sy) in-plane size, phi = length-axis angle,
  // proud = extra outward relief, jf = jitter scale
  function place(wall, baseQuat, cu, cv, sx, sy, phi, proud, jf){
    const ju=(rnd()-0.5)*g*1.2*params.randomness*jf;
    const jv=(rnd()-0.5)*g*1.2*params.randomness*jf;
    const jn=(rnd()-0.5)*T*0.45*params.randomness*jf;
    const pos=new THREE.Vector3().copy(wall.origin)
      .addScaledVector(wall.uDir, cu+ju)
      .addScaledVector(wall.vDir, cv+jv)
      .addScaledVector(wall.normal, (importedMesh ? T*0.5 : (T/2 - INSET)) + proud + jn);
    const q=baseQuat.clone();
    if(phi) q.multiply(new THREE.Quaternion().setFromAxisAngle(NORMAL_Z, phi));
    if(rotMax>0) q.multiply(new THREE.Quaternion().setFromEuler(new THREE.Euler((rnd()-0.5)*rotMax*jf,(rnd()-0.5)*rotMax*jf,(rnd()-0.5)*rotMax*jf)));
    mats.push(new THREE.Matrix4().compose(pos,q,new THREE.Vector3(Math.max(sx,0.001),Math.max(sy,0.001),T)));
    const c=base.clone(); c.multiplyScalar(1+(rnd()-0.5)*0.4*Math.max(0.25,params.randomness)); cols.push(c);
  }

  // clip a field footprint to the part inside the wall AND outside every opening -> cut "closure" bricks, no gaps
  function clipField(wall,u0,v0,u1,v1){
    let a0=Math.max(u0,0), a1=Math.min(u1,wall.uLen), b0=Math.max(v0,0), b1=Math.min(v1,wall.vLen);
    if(a1-a0<0.012 || b1-b0<0.008) return null;
    for(const op of wall.openings){
      const oA=(op.type==='circle')?[op.uc-op.rc,op.uc+op.rc,op.vc-op.rc,op.vc+op.rc]
                                   :[op.uc-op.ww/2,op.uc+op.ww/2,op.v0,op.v0+op.wh+op.ww/2];
      if(a1<oA[0]||a0>oA[1]||b1<oA[2]||b0>oA[3]) continue;        // far away -> ignore
      const NX=14,NY=9; let mnU=1e9,mxU=-1e9,mnV=1e9,mxV=-1e9,any=false;
      for(let i=0;i<NX;i++)for(let j=0;j<NY;j++){
        const uu=a0+(i+0.5)/NX*(a1-a0), vv=b0+(j+0.5)/NY*(b1-b0);
        if(!inOpening(op,uu,vv)){ any=true; if(uu<mnU)mnU=uu; if(uu>mxU)mxU=uu; if(vv<mnV)mnV=vv; if(vv>mxV)mxV=vv; }
      }
      if(!any) return null;                                       // brick fully inside the hole
      a0=mnU; a1=mxU; b0=mnV; b1=mxV;                            // trim STRICTLY outside the hole (no overhang into the opening)
      if(a1-a0<0.012||b1-b0<0.008) return null;
    }
    return {cu:(a0+a1)/2, cv:(b0+b1)/2, sx:a1-a0, sy:b1-b0};
  }

  const raycaster = new THREE.Raycaster();
  function placeClad(wall, baseQuat, u, v, nCoord){
    const q=baseQuat.clone();
    if(rotMax>0) q.multiply(new THREE.Quaternion().setFromEuler(new THREE.Euler((rnd()-0.5)*rotMax*0.5,(rnd()-0.5)*rotMax*0.5,(rnd()-0.5)*rotMax*0.5)));
    const pos=new THREE.Vector3().copy(wall.origin).addScaledVector(wall.uDir,u).addScaledVector(wall.vDir,v).addScaledVector(wall.normal,nCoord);
    mats.push(new THREE.Matrix4().compose(pos,q,new THREE.Vector3(L,Hb,T)));
    cols.push(base.clone());
  }
  // clad an imported mesh by raycasting each grid cell onto its real surface (follows silhouette + depth, skips empty)
  function cladByRaycast(wall, baseQuat){
    const stepU=L+g, stepV=Hb+g, out=Math.max(params.width,params.depth,params.height)+0.5;
    const dir=wall.normal.clone().negate(), o=new THREE.Vector3();
    const rows=Math.ceil(wall.vLen/stepV)+1, ncol=Math.ceil(wall.uLen/stepU)+1;
    for(let r=0;r<rows;r++){
      const v=r*stepV + Hb/2; if(v>wall.vLen) break;
      const off=(r%2)*(stepU/2);
      for(let c=0;c<ncol;c++){
        const u=off + c*stepU + L/2; if(u>wall.uLen) continue;
        o.copy(wall.origin).addScaledVector(wall.uDir,u).addScaledVector(wall.vDir,v).addScaledVector(wall.normal,out);
        raycaster.set(o, dir);
        const hit=raycaster.intersectObject(importedMesh, false);
        if(!hit.length) continue;
        placeClad(wall, baseQuat, u, v, (out - hit[0].distance) + T*0.5);
      }
    }
  }

  for(const wall of walls){
    const basis=new THREE.Matrix4().makeBasis(wall.uDir, wall.vDir, wall.normal);
    const baseQuat=new THREE.Quaternion().setFromRotationMatrix(basis);
    if(importedMesh){ cladByRaycast(wall, baseQuat); continue; }

    // FIELD: running bond across the whole wall, every brick clipped to fit the wall + openings (no gaps)
    const rows=Math.floor(wall.vLen/stepV)+1;
    for(let r=0;r<rows;r++){
      const v0=r*stepV, v1=v0+Hb;
      let off=0;
      if(params.bondType==='Running') off=(r%2)*(stepU/2);
      else if(params.bondType==='Wild') off=rnd()*stepU;
      const nCols=Math.ceil(wall.uLen/stepU)+2;
      for(let c=-1;c<nCols;c++){
        const u0=off+c*stepU, u1=u0+L;
        const f=clipField(wall,u0,v0,u1,v1);
        if(f) place(wall, baseQuat, f.cu, f.cv, f.sx, f.sy, 0, 0, 1);
      }
    }

    // EDGE course on top: bricks following each opening outline, sitting proud so the join is seamless
    for(const op of wall.openings){
      for(const b of borderFor(op, L, Hb, g)){
        if(b.cu<0 || b.cu>wall.uLen || b.cv<0 || b.cv>wall.vLen) continue;          // trim frame bricks off the wall
        let inOther=false; for(const o2 of wall.openings){ if(o2!==op && inOpening(o2,b.cu,b.cv)){ inOther=true; break; } }
        if(inOther) continue;                                                        // ...or into another opening
        place(wall, baseQuat, b.cu, b.cv, L, Hb, b.phi, FRAME_PROUD, 0.3);
      }
    }
  }

  const count = mats.length;
  lastMatrices = mats;
  if(csgReady){
    // merge all bricks (with per-brick vertex colour), then boolean-subtract each opening -> clean curved edges
    const geoms=[];
    for(let i=0;i<count;i++){ const gg=unitBox.clone(); gg.deleteAttribute('uv'); gg.applyMatrix4(mats[i]); geoms.push(gg); }
    const merged=BufferGeometryUtils.mergeGeometries(geoms,false);
    const ev=new Evaluator(); ev.attributes=['position','normal'];
    let res=new Brush(merged); res.updateMatrixWorld();
    for(const wall of walls) for(const op of wall.openings){
      const cb=new Brush(cutterFor(op, wall, params.brickDepth+0.4)); cb.updateMatrixWorld();
      res=ev.evaluate(res, cb, SUBTRACTION);
    }
    csgMat.color.set(params.color);
    res.material=csgMat; res.castShadow=true; res.receiveShadow=true;
    brickMesh=res; lastBrickGeo=res.geometry; scene.add(brickMesh);
  } else {
    brickMesh = new THREE.InstancedMesh(unitBox, brickMat, count);
    brickMesh.castShadow = true; brickMesh.receiveShadow = true;
    for(let i=0;i<count;i++){ brickMesh.setMatrixAt(i,mats[i]); brickMesh.setColorAt(i,cols[i]); }
    brickMesh.instanceMatrix.needsUpdate = true;
    if(brickMesh.instanceColor) brickMesh.instanceColor.needsUpdate = true;
    lastBrickGeo=null; scene.add(brickMesh);
  }

  if(importedMesh){
    if(!importedMesh.parent) scene.add(importedMesh);   // show the real STL behind the brick cladding
    importedMesh.visible = params.showCore;
  } else {
    coreMesh = new THREE.Mesh(new THREE.BoxGeometry(params.width-2*INSET, params.height, params.depth-2*INSET), coreMat);
    coreMesh.position.set(0, params.height/2, 0);
    coreMesh.castShadow = true; coreMesh.receiveShadow = true;
    coreMesh.visible = params.showCore;
    scene.add(coreMesh);

    const rh = params.height*0.45;
    roofMesh = new THREE.Mesh(new THREE.ConeGeometry(Math.max(params.width,params.depth)*0.8, rh, 4), roofMat);
    roofMesh.rotation.y = Math.PI/4;
    roofMesh.position.set(0, params.height + rh/2 - 0.02, 0);
    roofMesh.castShadow = true;
    scene.add(roofMesh);
  }

  controls.target.set(0, params.height*0.5, 0);
  document.getElementById('stats').innerHTML = `<b>${count.toLocaleString()}</b> bricks · ${params.bondType} bond · brick ${(L*100).toFixed(0)}×${(Hb*100).toFixed(0)}×${(T*100).toFixed(1)} cm`;
}

// ---------- Bake to STL ----------
function exportSTL(){
  const geoms=[];
  if(lastBrickGeo){                                   // boolean-trimmed mesh -> the clean printable geometry
    const b=lastBrickGeo.clone(); if(b.attributes.color) b.deleteAttribute('color'); if(b.attributes.uv) b.deleteAttribute('uv'); geoms.push(b);
  } else {
    for(const mat of lastMatrices){ const gg=unitBox.clone(); if(gg.attributes.uv) gg.deleteAttribute('uv'); gg.applyMatrix4(mat); geoms.push(gg); }
  }
  const cg=new THREE.BoxGeometry(params.width-2*INSET, params.height, params.depth-2*INSET);
  cg.translate(0, params.height/2, 0); if(cg.attributes.uv) cg.deleteAttribute('uv');
  geoms.push(cg);
  const merged=BufferGeometryUtils.mergeGeometries(geoms,false);
  const mesh=new THREE.Mesh(merged);
  const data=new STLExporter().parse(mesh,{binary:true});
  const blob=new Blob([data],{type:'application/octet-stream'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='brick-building.stl';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  merged.dispose();
}

// debounce rebuilds so dragging a slider doesn't run the boolean on every tick
let _bt; function rebuild(){ clearTimeout(_bt); _bt=setTimeout(build, 180); }

// ---------- GUI ----------
const gui = new GUI({ title:'Brick Controls' });
const fB = gui.addFolder('Building');
fB.add(params,'width',2,8,0.1).onChange(rebuild);
fB.add(params,'depth',2,8,0.1).onChange(rebuild);
fB.add(params,'height',2,6,0.1).onChange(rebuild);
const fK = gui.addFolder('Brick');
fK.add(params,'brickLength',0.08,0.40,0.005).name('Brick size (length)').onChange(rebuild);
fK.add(params,'brickHeight',0.03,0.15,0.002).name('Brick height').onChange(rebuild);
fK.add(params,'brickDepth',0.01,0.12,0.002).name('Brick depth (relief)').onChange(rebuild);
fK.add(params,'mortarGap',0,0.04,0.001).name('Mortar gap').onChange(rebuild);
fK.add(params,'bondType',['Running','Stack','Wild']).name('Brick type / bond').onChange(rebuild);
fK.add(params,'randomness',0,1,0.01).name('Randomness').onChange(rebuild);
fK.add(params,'rotation',0,1,0.01).name('Rotation jitter').onChange(rebuild);
fK.addColor(params,'color').name('Brick colour').onChange(rebuild);
const fV = gui.addFolder('View / Export');
fV.add(params,'showCore').name('Show core wall').onChange(v=>{ if(coreMesh) coreMesh.visible=v; });
fV.add(params,'exportSTL').name('⬇  Export STL (bake)');

// ---------- Import a real STL to clad ----------
const stlLoader = new STLLoader();
const fileInput = document.createElement('input');
fileInput.type='file'; fileInput.accept='.stl,model/stl'; fileInput.style.display='none';
document.body.appendChild(fileInput);
fileInput.addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=ev=>{ try{ loadSTL(ev.target.result, f.name); }catch(err){ console.error('STL load failed:', err); alert('Could not read that STL file.'); } };
  reader.readAsArrayBuffer(f);
  fileInput.value='';
});
function loadSTL(buffer, name){
  const geo = stlLoader.parse(buffer);
  geo.computeVertexNormals();
  geo.center();
  geo.computeBoundingBox();
  const size=new THREE.Vector3(); geo.boundingBox.getSize(size);
  const s = 4.0 / Math.max(size.x, size.y, size.z);          // fit largest dimension to ~4 units
  geo.scale(s,s,s);
  geo.computeBoundingBox(); geo.boundingBox.getSize(size);
  geo.translate(0, size.y/2, 0);                              // sit it on the ground
  if(importedMesh){ scene.remove(importedMesh); importedMesh.geometry.dispose(); }
  importedMesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color:0x17181b, roughness:1, side:THREE.DoubleSide }));
  importedMesh.castShadow=true; importedMesh.receiveShadow=true;
  scene.add(importedMesh);
  params.width=size.x; params.depth=size.z; params.height=size.y;   // clad its bounding box
  build();
  document.getElementById('info').innerHTML = '<b>Imported:</b> '+(name||'model.stl')+'<br>Bricks clad its bounding box. Hit <b>Use sample building</b> to go back.';
}
function loadExample(){ fetch('sample-building.stl').then(r=>r.arrayBuffer()).then(b=>loadSTL(b,'example building')).catch(e=>{ console.error(e); alert('Could not load the example building file.'); }); }
const fIm = gui.addFolder('Import');
fIm.add({ pick: ()=>fileInput.click() }, 'pick').name('⬆  Import STL…');
fIm.add({ ex: loadExample }, 'ex').name('🏠  Load example building');
fIm.add({ sample: ()=>{ if(importedMesh){ scene.remove(importedMesh); importedMesh.geometry.dispose(); importedMesh=null; build(); } } }, 'sample').name('↩  Use sample building');

// ---------- Loop ----------
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
build();
loadCSG();
(function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera); })();
</script>
